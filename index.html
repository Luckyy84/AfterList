<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="AfterList is a personal watchlist for tracking anime, movies, and TV series across planned, watching, watched, and dropped statuses."
    />
    <meta name="theme-color" content="#050608" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        const savedTheme = localStorage.getItem('afterlist-theme')
        const theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme
        document.querySelector('meta[name="theme-color"]').content = theme === 'light' ? '#eee9df' : '#050608'
      } catch {}
    </script>
    <title>AfterList</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
